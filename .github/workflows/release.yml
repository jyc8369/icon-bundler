name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: release/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-py312-${{ hashFiles('requirements.txt', 'release/build/requirements-build.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py312-

      - name: Install dependencies
        run: |
          pip install -r ../../requirements.txt
          pip install -r requirements-build.txt

      - name: Build Windows package
        shell: cmd
        run: build_windows.cmd

      - name: Zip Windows package
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '^v', ''
          $outDir = "../artifacts/windows"
          if (Test-Path $outDir) { Remove-Item -Recurse -Force $outDir }
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          Compress-Archive -Path "dist\IconBundler\*" -DestinationPath "$outDir\IconBundler-$version-windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/artifacts/windows/IconBundler-*-windows.zip

  build-macos-arm64:
    runs-on: macos-15
    defaults:
      run:
        working-directory: release/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: arm64

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-arm64-py312-${{ hashFiles('requirements.txt', 'release/build/requirements-build.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-arm64-py312-

      - name: Install dependencies
        run: |
          pip install -r ../../requirements.txt
          pip install -r requirements-build.txt

      - name: Build macOS package
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Zip macOS app
        run: |
          version="${GITHUB_REF_NAME#v}"
          out_dir="../artifacts/macos"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          ditto -c -k --sequesterRsrc --keepParent "dist/IconBundler.app" "$out_dir/IconBundler-${version}-macos-arm64.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-release
          path: release/artifacts/macos/IconBundler-*-macos-arm64.zip

  build-macos-x86_64:
    runs-on: macos-15-intel
    defaults:
      run:
        working-directory: release/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-x64-py312-${{ hashFiles('requirements.txt', 'release/build/requirements-build.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-x64-py312-

      - name: Install dependencies
        run: |
          pip install -r ../../requirements.txt
          pip install -r requirements-build.txt

      - name: Build macOS package
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Zip macOS app
        run: |
          version="${GITHUB_REF_NAME#v}"
          out_dir="../artifacts/macos"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          ditto -c -k --sequesterRsrc --keepParent "dist/IconBundler.app" "$out_dir/IconBundler-${version}-macos-x86_64.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-release
          path: release/artifacts/macos/IconBundler-*-macos-x86_64.zip

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos-arm64
      - build-macos-x86_64
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release/artifacts/windows

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-release
          path: release/artifacts/macos

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-x86_64-release
          path: release/artifacts/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/artifacts/windows/IconBundler-*-windows.zip
            release/artifacts/macos/IconBundler-*-macos-arm64.zip
            release/artifacts/macos/IconBundler-*-macos-x86_64.zip
